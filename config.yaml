# Real Deal - Ontario Cash-Flow Scanner Config

min_price: 200000
max_price: 450000
province: "ON"

cities:
  tier_1:
    - Windsor
    - Sarnia
    - Chatham-Kent
    - Sudbury
    - North Bay
    - Thunder Bay
    - Timmins
    - Sault Ste. Marie
    - Cornwall
    - Welland
  tier_2:
    - St. Catharines
    - Niagara Falls
    - Brantford
    - Peterborough
    - Belleville
    - Kingston
    - London
    - Oshawa
    - Hamilton
  tier_3:
    - Elliot Lake
    - Kapuskasing
    - Cochrane
    - Pembroke
    - Owen Sound
    - Stratford
    - Leamington
    - Amherstburg
  bruce_county:
    - Kincardine
    - Walkerton
    - Hanover
    - Port Elgin
    - Southampton
    # Bruce County area (listings may use these city names)
    - South Bruce
    - Ripley
    - Tiverton
    - Bruce Peninsula
  alberta:
    - Edmonton
    - Calgary
    - Red Deer
    - Lethbridge
    - Medicine Hat
    - Grande Prairie

# Province mapping per tier (default: value of 'province' above, i.e. ON)
tier_provinces:
  alberta: "AB"

keyword_filters:
  require_include_match: false  # Broad scan first; classify duplex in post-processing
  include:
    - duplex
    - 2 unit
    - 2-unit
    - triplex
    - multi-family
    - multi family
    - legal duplex
    - in-law
    - in law
    - upper unit
    - lower unit
    - upstairs
    - downstairs
    - separate entrance
    - basement apartment
    - secondary suite
    - two kitchens
    - 2 kitchens
    - income property
  exclude:
    - parking only
    - student room

underwriting:
  vacancy_rate: 0.06
  management_rate: 0.08
  maintenance_rate: 0.05
  capex_rate: 0.05
  insurance_monthly: 150
  utilities_monthly: 250
  snow_lawn_monthly: 75
  closing_cost_rate: 0.02
  down_payment_rate: 0.20
  interest_rate: 0.055
  amort_years: 30
  property_tax_rate_annual: 0.011

stress_test:
  rent_haircut: 0.07
  interest_rate_bump: 0.01
  vacancy_bump: 0.02
  maintenance_bump: 0.01
  capex_bump: 0.01

# Export & report: listings with base-case cashflow >= this (e.g. -500 = up to $500/mo drawdown)
export_filters:
  min_cashflow_monthly: -500

pass_fail:
  min_cashflow_monthly: -500
  min_dscr: 1.15
  min_cash_on_cash: 0.08
  require_stress_dscr: false
  # Margin of safety score (0-100)
  margin_of_safety_base: 50
  margin_of_safety_stress_positive: 25
  margin_of_safety_stress_threshold: 15
  margin_of_safety_coc: 5
  margin_of_safety_dscr: 5

rent_estimation:
  # Default for cities not in any tier
  default:
    base: 1200
    per_bedroom: 800
  # Tiered formula: rent = base + per_bedroom * bedrooms (by city tier)
  tiers:
    tier_1:
      base: 1400
      per_bedroom: 900
    tier_2:
      base: 1200
      per_bedroom: 800
    tier_3:
      base: 1100
      per_bedroom: 650
    bruce_county:
      base: 1000
      per_bedroom: 500
    alberta:
      base: 1300
      per_bedroom: 800
  # Bounds for parsed rent from description (sanity check)
  min_rent: 500
  max_rent: 15000
  # Formula fallback caps — extra bedrooms rarely mean separate leases
  max_bedrooms_single_unit: 4   # legacy; income-property per-unit cap
  max_bedrooms_per_unit: 3      # per legal suite / unit in a duplex+
  # Single-family whole-home rent (when not duplex/multi — avoids $5k tier_1 stacks)
  single_family:
    default:
      base: 1200
      per_bedroom: 350
      max_rent: 2500
    tiers:
      tier_1:
        base: 1400
        per_bedroom: 400
        max_rent: 2800
      tier_2:
        base: 1200
        per_bedroom: 350
        max_rent: 2600
      tier_3:
        base: 1100
        per_bedroom: 300
        max_rent: 2300
      bruce_county:
        base: 1000
        per_bedroom: 250
        max_rent: 2000
      alberta:
        base: 1300
        per_bedroom: 375
        max_rent: 2700

# Tiered property tax & insurance (by city tier; falls back to underwriting defaults)
assumption_tiers:
  tier_1:
    property_tax_rate_annual: 0.0115
    insurance_monthly: 165
  tier_2:
    property_tax_rate_annual: 0.011
    insurance_monthly: 155
  tier_3:
    property_tax_rate_annual: 0.0105
    insurance_monthly: 140
  bruce_county:
    property_tax_rate_annual: 0.010
    insurance_monthly: 130
  alberta:
    property_tax_rate_annual: 0.0095
    insurance_monthly: 150

# Vacant land / raw lot underwriting (separate from residential cash-flow)
land_underwriting:
  report_output_dir: "outputs/underwriting"
  max_hold_years: 3
  interest_rate: 0.075
  closing_cost_rate: 0.025
  annual_property_tax_rate: 0.011
  annual_insurance_per_acre: 150
  legal_survey_cost: 2500
  solicitor_closing: 1500
  min_frontage_ft: 50
  ideal_frontage_ft: 100
  default_frontage_ft: 75
  septic_allowance: 25000
  road_upgrade_allowance: 35000
  servicing_already_connected: 5000
  environmental_servicing_multiplier: 1.35
  target_roi_pct: 15
  liquidity_price_min: 25000
  liquidity_price_max: 350000
  servicing_cost_per_ft_frontage:
    full_urban: 120
    rural: 85
    remote: 45
    partial: 65
  build_ready_value_per_acre:
    tier_1: 48000
    tier_2: 38000
    tier_3: 32000
    bruce_county: 30000
    alberta: 40000
  buildable_acre_cap: 5
  raw_acreage_value_fraction: 0.35
  serviced_lot_resale_multiple: 1.38
  severance_buildable_acre_cap: 2
  severance_unapproved_raw_fraction: 0.18
  land_type_value_multipliers:
    vacant_residential_lot: 1.1
    development_land: 1.15
    raw_land: 0.85
    recreational: 0.9
    farmland: 0.75
    severance_opportunity: 1.05
    default: 1.0
  score_weights:
    buildability: 0.35
    financial: 0.25
    exit_strategy: 0.15
    risk_inverse: 0.25
  thresholds:
    strong_candidate: 72
    investigate: 48
  openai:
    enabled: true
    model: gpt-4o-mini

data_source:
  # Connector: "realtor", "redfin", or "both" (merge and dedupe)
  connector: "both"
  # RapidAPI Realtor.ca Scraper API (baqo271)
  rapidapi_host: "realtor-ca-scraper-api.p.rapidapi.com"
  rapidapi_key_env: RAPIDAPI_KEY
  delay_seconds: 2.0
  # Filter out "no longer available" listings (Realtor.ca uses $1 as placeholder)
  min_price: 20000
  # PropertyTypeGroupID: 1=Residential, 2=Recreational, 3=Condo, 4=Commercial (Realtor only)
  property_type_group_id: "1"
  # Search area: bounding box delta (degrees, ~111km/degree) and zoom level (Realtor only)
  bounding_box_delta: 0.15
  zoom_level: "10"
  # Redfin Canada API (Apidojo) - used when connector: redfin
  redfin_host: "redfin-canada.p.rapidapi.com"